<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Yoga em Família — 30 cartões de poses para fazerem juntos">
  <defs>
    <linearGradient id="yfBg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#FDF8F0"/>
      <stop offset="1" stop-color="#F6EEE0"/>
    </linearGradient>
    <filter id="yfShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="10" stdDeviation="8" flood-color="#5a3c28" flood-opacity="0.25"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="800" height="400" fill="url(#yfBg)"/>

  <!-- kicker -->
  <text x="60" y="60" font-family="Inter, system-ui, sans-serif" font-size="12" font-weight="800" letter-spacing="2" fill="#c2b49c">MOVAM-SE · RESPIREM · DIVIRTAM-SE</text>

  <!-- title -->
  <text x="60" y="120" font-family="'Baloo 2', 'Inter', sans-serif" font-size="56" font-weight="800" fill="#5a4636">Yoga em Família</text>

  <!-- tagline -->
  <text x="60" y="158" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8a8071">30 cartões de poses para</text>
  <text x="60" y="180" font-family="Inter, system-ui, sans-serif" font-size="17" fill="#8a8071">fazerem juntos · PT · EN</text>

  <!-- start button mockup -->
  <g transform="translate(60 230)">
    <rect width="180" height="46" rx="23" fill="#F4AE89"/>
    <text x="90" y="30" font-family="'Baloo 2', Inter, sans-serif" font-size="18" font-weight="800" fill="#fff" text-anchor="middle">Começar ▶</text>
  </g>

  <!-- fan of three cards (hero) -->
  <g transform="translate(600 200)" filter="url(#yfShadow)">
    <!-- left: green / balance / tree -->
    <g transform="rotate(-14) translate(-130 -90)">
      <rect width="120" height="160" rx="18" fill="#fff" stroke="#93CC8A" stroke-width="3"/>
      <rect x="3" y="3" width="114" height="154" rx="15" fill="#FBF7EE"/>
      <g transform="translate(60 80)">
        <circle cx="0" cy="-20" r="22" fill="#93CC8A" opacity="0.6"/>
        <rect x="-3" y="0" width="6" height="20" fill="#93CC8A" opacity="0.6"/>
      </g>
    </g>
    <!-- center: blue / stretching -->
    <g transform="translate(-60 -100)">
      <rect width="120" height="160" rx="18" fill="#fff" stroke="#7FB3E0" stroke-width="3"/>
      <rect x="3" y="3" width="114" height="154" rx="15" fill="#FBF7EE"/>
      <g transform="translate(60 80)" fill="#7FB3E0" opacity="0.6">
        <circle cx="0" cy="-22" r="10"/>
        <rect x="-3" y="-12" width="6" height="22"/>
        <line x1="0" y1="-8" x2="-14" y2="-2" stroke="#7FB3E0" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="-8" x2="14" y2="-2" stroke="#7FB3E0" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="10" x2="-10" y2="28" stroke="#7FB3E0" stroke-width="6" stroke-linecap="round"/>
        <line x1="0" y1="10" x2="10" y2="28" stroke="#7FB3E0" stroke-width="6" stroke-linecap="round"/>
      </g>
    </g>
    <!-- right: pink / connection / heart -->
    <g transform="rotate(14) translate(10 -90)">
      <rect width="120" height="160" rx="18" fill="#fff" stroke="#EF9DBE" stroke-width="3"/>
      <rect x="3" y="3" width="114" height="154" rx="15" fill="#FBF7EE"/>
      <path d="M 60 110 C 30 80, 30 50, 60 60 C 90 50, 90 80, 60 110 Z" fill="#EF9DBE" opacity="0.6"/>
    </g>
  </g>

  <!-- category dots row at bottom -->
  <g transform="translate(60 340)">
    <circle cx="0" cy="0" r="10" fill="#7FB3E0"/>
    <circle cx="28" cy="0" r="10" fill="#93CC8A"/>
    <circle cx="56" cy="0" r="10" fill="#F2A878"/>
    <circle cx="84" cy="0" r="10" fill="#ECC75E"/>
    <circle cx="112" cy="0" r="10" fill="#AD96D8"/>
    <circle cx="140" cy="0" r="10" fill="#EF9DBE"/>
    <text x="170" y="5" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="700" fill="#a99e8c">6 categorias</text>
  </g>
</svg>
