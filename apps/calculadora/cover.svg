<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Calculadora de Salários — Portugal 2026">
  <defs>
    <linearGradient id="bgc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ECFBFC"/>
      <stop offset="1" stop-color="#D4F0F3"/>
    </linearGradient>
    <pattern id="gridc" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M20 0H0V20" fill="none" stroke="#B8E0E4" stroke-width="0.5"/>
    </pattern>
    <linearGradient id="barGross" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2b8c96"/>
      <stop offset="1" stop-color="#1f6b73"/>
    </linearGradient>
    <linearGradient id="barNet" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#4DB8C2"/>
      <stop offset="1" stop-color="#2b8c96"/>
    </linearGradient>
  </defs>

  <rect width="800" height="400" fill="url(#bgc)"/>
  <rect width="800" height="400" fill="url(#gridc)" opacity="0.5"/>

  <!-- waterfall: gross -> IRS -> SS -> net -->
  <g>
    <!-- baseline -->
    <line x1="80" y1="340" x2="720" y2="340" stroke="#2b8c96" stroke-width="1.2" opacity="0.4"/>

    <!-- Bruto -->
    <rect x="110" y="140" width="120" height="200" rx="6" fill="url(#barGross)"/>
    <text x="170" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#1f6b73">Bruto</text>
    <text x="170" y="220" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#fff">2000€</text>

    <!-- IRS deduction -->
    <rect x="270" y="140" width="100" height="55" rx="4" fill="#E76F51" opacity="0.9"/>
    <text x="320" y="130" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#a1462e">IRS</text>
    <text x="320" y="173" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">−220€</text>

    <!-- SS deduction -->
    <rect x="270" y="200" width="100" height="45" rx="4" fill="#F4A261" opacity="0.95"/>
    <text x="320" y="229" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="14" font-weight="600" fill="#fff">SS −220€</text>

    <!-- connector lines -->
    <path d="M230 145 L 270 145" stroke="#1f6b73" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5"/>
    <path d="M230 245 L 410 245" stroke="#1f6b73" stroke-width="1.5" stroke-dasharray="3 3" opacity="0.5"/>

    <!-- Líquido -->
    <rect x="410" y="245" width="120" height="95" rx="6" fill="url(#barNet)"/>
    <text x="470" y="235" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="13" font-weight="600" fill="#1f6b73">Líquido</text>
    <text x="470" y="298" text-anchor="middle" font-family="Inter, system-ui, sans-serif" font-size="20" font-weight="700" fill="#fff">1560€</text>
  </g>

  <!-- euro mark & wordmark -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="580" y="180" font-size="140" font-weight="700" fill="#2b8c96" opacity="0.12">€</text>
    <text x="80" y="80" font-size="32" font-weight="700" letter-spacing="-0.5" fill="#0f4a50">Calculadora de Salários</text>
    <text x="80" y="105" font-size="14" font-weight="500" fill="#2b8c96">Portugal 2026 · IRS · Seg. Social · Líquido</text>
  </g>
</svg>
