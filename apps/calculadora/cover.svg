<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Calculadora de Salários — Portugal 2026">
  <defs>
    <linearGradient id="bgc" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#F2FAFB"/>
      <stop offset="1" stop-color="#D8EEF1"/>
    </linearGradient>
  </defs>

  <!-- background -->
  <rect width="800" height="400" fill="url(#bgc)"/>

  <!-- wordmark -->
  <g font-family="Inter, system-ui, sans-serif">
    <text x="60" y="70" font-size="30" font-weight="700" letter-spacing="-0.5" fill="#0f4a50">Calculadora de Salários</text>
    <text x="60" y="94" font-size="14" font-weight="500" fill="#2b8c96">Portugal 2026 · IRS · Seg. Social · Líquido</text>
  </g>

  <!-- euro watermark -->
  <text x="660" y="120" font-family="Inter, system-ui, sans-serif" font-size="200" font-weight="700" fill="#2b8c96" opacity="0.08" text-anchor="middle">€</text>

  <!-- Mock UI card: form + results -->
  <g transform="translate(60 130)">
    <!-- card frame -->
    <rect width="680" height="240" rx="14" fill="#ffffff" stroke="#C7E4E8" stroke-width="1"/>

    <!-- left column: inputs -->
    <g font-family="Inter, system-ui, sans-serif" fill="#0f4a50">
      <text x="24" y="34" font-size="11" font-weight="600" letter-spacing="0.05em" fill="#6B8A8F">SALÁRIO BRUTO MENSAL</text>
      <rect x="24" y="44" width="280" height="42" rx="6" fill="#F6FBFB" stroke="#B8DADE"/>
      <text x="40" y="72" font-size="22" font-weight="700" font-family="ui-monospace, SFMono-Regular, monospace">2 000,00 €</text>

      <text x="24" y="116" font-size="11" font-weight="600" letter-spacing="0.05em" fill="#6B8A8F">ESTADO CIVIL · DEPENDENTES</text>
      <g transform="translate(24 126)">
        <rect width="130" height="34" rx="6" fill="#2b8c96"/>
        <text x="65" y="22" font-size="12" font-weight="600" fill="#fff" text-anchor="middle">Não casado</text>
        <rect x="140" width="60" height="34" rx="6" fill="#F6FBFB" stroke="#B8DADE"/>
        <text x="170" y="22" font-size="14" font-weight="700" fill="#0f4a50" text-anchor="middle">0</text>
      </g>

      <!-- rate badges -->
      <g transform="translate(24 180)">
        <rect width="86" height="34" rx="6" fill="#F6FBFB" stroke="#B8DADE"/>
        <text x="43" y="15" font-size="9" font-weight="600" fill="#6B8A8F" text-anchor="middle">TAXA IRS</text>
        <text x="43" y="28" font-size="13" font-weight="700" fill="#0f4a50" text-anchor="middle" font-family="ui-monospace, monospace">11%</text>

        <rect x="96" width="86" height="34" rx="6" fill="#F6FBFB" stroke="#B8DADE"/>
        <text x="139" y="15" font-size="9" font-weight="600" fill="#6B8A8F" text-anchor="middle">TAXA SS</text>
        <text x="139" y="28" font-size="13" font-weight="700" fill="#0f4a50" text-anchor="middle" font-family="ui-monospace, monospace">11%</text>

        <rect x="192" width="112" height="34" rx="6" fill="#F6FBFB" stroke="#B8DADE"/>
        <text x="248" y="15" font-size="9" font-weight="600" fill="#6B8A8F" text-anchor="middle">SUBS. REFEIÇÃO</text>
        <text x="248" y="28" font-size="13" font-weight="700" fill="#0f4a50" text-anchor="middle" font-family="ui-monospace, monospace">6,00 €/d</text>
      </g>
    </g>

    <!-- divider -->
    <line x1="340" y1="24" x2="340" y2="216" stroke="#E4F1F3" stroke-width="1"/>

    <!-- right column: result cards -->
    <g font-family="Inter, system-ui, sans-serif">
      <!-- Bruto card -->
      <rect x="360" y="24" width="140" height="90" rx="10" fill="#F6FBFB" stroke="#C7E4E8"/>
      <text x="430" y="48" font-size="10" font-weight="600" fill="#6B8A8F" text-anchor="middle" letter-spacing="0.05em">BRUTO ANUAL</text>
      <text x="430" y="80" font-size="20" font-weight="700" fill="#0f4a50" text-anchor="middle" font-family="ui-monospace, monospace">28 000 €</text>
      <text x="430" y="100" font-size="10" fill="#6B8A8F" text-anchor="middle">14× mensal</text>

      <!-- IRS card -->
      <rect x="512" y="24" width="140" height="90" rx="10" fill="#FEF3F0" stroke="#F4CBBE"/>
      <text x="582" y="48" font-size="10" font-weight="600" fill="#A1462E" text-anchor="middle" letter-spacing="0.05em">IRS</text>
      <text x="582" y="80" font-size="20" font-weight="700" fill="#A1462E" text-anchor="middle" font-family="ui-monospace, monospace">−220,00 €</text>
      <text x="582" y="100" font-size="10" fill="#B56D54" text-anchor="middle">retenção mensal</text>

      <!-- SS card -->
      <rect x="360" y="126" width="140" height="90" rx="10" fill="#FDF6EC" stroke="#F4D9B0"/>
      <text x="430" y="150" font-size="10" font-weight="600" fill="#8A5C1C" text-anchor="middle" letter-spacing="0.05em">SEG. SOCIAL</text>
      <text x="430" y="182" font-size="20" font-weight="700" fill="#8A5C1C" text-anchor="middle" font-family="ui-monospace, monospace">−220,00 €</text>
      <text x="430" y="202" font-size="10" fill="#A57A3C" text-anchor="middle">11% bruto</text>

      <!-- Líquido card - highlighted -->
      <rect x="512" y="126" width="140" height="90" rx="10" fill="#2b8c96"/>
      <text x="582" y="150" font-size="10" font-weight="600" fill="#C9EBEF" text-anchor="middle" letter-spacing="0.05em">LÍQUIDO</text>
      <text x="582" y="182" font-size="20" font-weight="700" fill="#ffffff" text-anchor="middle" font-family="ui-monospace, monospace">1 560,00 €</text>
      <text x="582" y="202" font-size="10" fill="#C9EBEF" text-anchor="middle">mensal</text>
    </g>
  </g>
</svg>
